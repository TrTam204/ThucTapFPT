<div class="products-container">
  <h2>Danh sách sản phẩm</h2>
  <button class="logout-btn" (click)="logout()">Đăng xuất</button>

  <div class="products-list" *ngIf="products.length > 0; else noProducts">
    <div class="product-item" *ngFor="let product of products">
      <span class="product-name">{{ product.name }}</span>
      <span class="product-price">{{ product.price | currency:'VND':'symbol':'1.0-0' }}</span>
    </div>
  </div>

  <ng-template #noProducts>
    <p class="no-products">Không có sản phẩm nào.</p>
  </ng-template>
</div>
