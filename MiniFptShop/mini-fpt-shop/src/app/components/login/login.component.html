<div class="login-shell">
  <form class="login-box" (ngSubmit)="onSubmit()">
    <div class="login-top">
      <h1>Đăng nhập</h1>
      <p>Đăng nhập để quản lý đơn hàng và gói dịch vụ.</p>
    </div>

    <label>
      Tên đăng nhập
      <input type="text" placeholder="Nhập tên đăng nhập" [(ngModel)]="username" name="username" />
    </label>

    <label>
      Mật khẩu
      <input type="password" placeholder="Nhập mật khẩu" [(ngModel)]="password" name="password" />
    </label>

    <button type="submit">Đăng nhập</button>

    <div class="auth-message" *ngIf="message">{{ message }}</div>
  </form>
</div>
